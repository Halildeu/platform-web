name: CI - Web Image Build + GHCR Push

# Faz 19.8 dual-build — Codex AGREE 019dc0ef Option B
# Yeni image isimleri:
#   - ghcr.io/halildeu/platform-web-frontend        (prod build args)
#   - ghcr.io/halildeu/platform-web-frontend-testai (test build args)
# Gitops overlay'leri 19.9'da digest pin ile bu image'lara geçecek.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: halildeu

jobs:
  build-and-push:
    name: Build + Push ${{ matrix.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: prod
            image_name: platform-web-frontend
            kc_url: https://ai.acik.com
            kc_realm: serban
            origin: https://ai.acik.com
            # 2026-04-25 Faz 19.MSSQL.O: gateway URL'ye /api suffix eklendi.
            # Önceki: https://ai.acik.com → AuthBootstrapper api.get('/v1/authz/me')
            # → https://ai.acik.com/v1/authz/me (404 → SPA fallback HTML → JSON parse fail
            # → permissions: [] → header'da modüller görünmüyor "henüz hiçbir rol atanmamış").
            # Doğru: https://ai.acik.com/api → resolve = /api/v1/authz/me → backend OK.
            gateway: https://ai.acik.com/api
          - variant: testai
            image_name: platform-web-frontend-testai
            kc_url: https://testai.acik.com
            kc_realm: platform-test
            origin: https://testai.acik.com
            gateway: https://testai.acik.com/api

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # K2 (Wave 1.1) — Docker build context'ine taze evidence + scorecard yaz.
      # GHCR image içine baked olur, Design Lab Truth Plane production'da güncel kalır.
      - name: Setup Node.js 22 (for evidence sync)
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store (sync deps)
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (for evidence sync)
        run: pnpm install --frozen-lockfile

      - name: Sync public evidence + scorecard (taze artifact)
        run: node scripts/sync-public-evidence.mjs

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build + Push image (${{ matrix.variant }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_KEYCLOAK_URL=${{ matrix.kc_url }}
            VITE_KEYCLOAK_REALM=${{ matrix.kc_realm }}
            VITE_KEYCLOAK_CLIENT_ID=frontend
            VITE_FRONTEND_PUBLIC_ORIGIN=${{ matrix.origin }}
            VITE_GATEWAY_URL=${{ matrix.gateway }}
            VITE_AUTH_MODE=keycloak
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
          provenance: false

      - name: Summary — digest (19.9 pin için kanıt)
        run: |
          echo "### ${{ matrix.image_name }} image push (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pinnable**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build args**:" >> $GITHUB_STEP_SUMMARY
          echo "  - VITE_KEYCLOAK_URL: \`${{ matrix.kc_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "  - VITE_KEYCLOAK_REALM: \`${{ matrix.kc_realm }}\`" >> $GITHUB_STEP_SUMMARY
