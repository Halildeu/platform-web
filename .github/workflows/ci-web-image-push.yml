name: CI - Web Image Build + GHCR Push

# Faz 19.8 dual-build — Codex AGREE 019dc0ef Option B
# Yeni image isimleri:
#   - ghcr.io/halildeu/platform-web-frontend        (prod build args)
#   - ghcr.io/halildeu/platform-web-frontend-testai (test build args)
# Gitops overlay'leri 19.9'da digest pin ile bu image'lara geçecek.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/mfe-ethic/**'
      - 'apps/mfe-shell/**'
      - 'packages/**'
      - 'scripts/deploy/**'
      - 'scripts/sync-public-evidence.mjs'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-web-image-push.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: halildeu

jobs:
  build-and-push:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Build + Push ${{ matrix.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: prod
            image_name: platform-web-frontend
            kc_url: https://ai.acik.com
            kc_realm: serban
            origin: https://ai.acik.com
            # 2026-04-25 Faz 19.MSSQL.O: gateway URL'ye /api suffix eklendi.
            # Önceki: https://ai.acik.com → AuthBootstrapper api.get('/v1/authz/me')
            # → https://ai.acik.com/v1/authz/me (404 → SPA fallback HTML → JSON parse fail
            # → permissions: [] → header'da modüller görünmüyor "henüz hiçbir rol atanmamış").
            # Doğru: https://ai.acik.com/api → resolve = /api/v1/authz/me → backend OK.
            gateway: https://ai.acik.com/api
            # PERF-INIT-V2 B5b1: prod stays on default eager bootstrap (no
            # canary risk on production); flip to "true" only when B5b1 is
            # ready for prod rollout (post-canary measurement + B5b2 admin
            # ramp closure).
            mfe_on_demand_bootstrap: 'false'
            # Faz 22.5 endpoint-admin GA (owner 2026-06-10 "ga açalım"): include
            # the endpoint-admin MFE in the prod eager build (buildRemotes +
            # define + env-config). Backplane (gitops#1436) + modal (#1438) live.
            enable_endpoint_admin: 'true'
            enable_ethic: 'false'
          - variant: testai
            image_name: platform-web-frontend-testai
            kc_url: https://testai.acik.com
            kc_realm: platform-test
            origin: https://testai.acik.com
            gateway: https://testai.acik.com/api
            # PERF-INIT-V2 B5b1 canary: testai variant builds with the
            # MFE on-demand bootstrap flag enabled. Eager
            # federation({remotes}) drops the `mfe_suggestions` entry +
            # static `import('mfe_suggestions/SuggestionsApp')` specifier
            # is dead-code-eliminated; route render swaps to runtime
            # `host.registerRemotes` + `host.loadRemote` against the host
            # MF instance.  Auto-applied to every commit reaching testai;
            # prod variant stays unaffected (above row).
            mfe_on_demand_bootstrap: 'true'
            # Faz 35 ES-204: manager MFE is test-first on testai.acik.com.
            enable_ethic: 'true'

    steps:
      - name: Checkout exact immutable source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # K2 (Wave 1.1) — Docker build context'ine taze evidence + scorecard yaz.
      # GHCR image içine baked olur, Design Lab Truth Plane production'da güncel kalır.
      - name: Setup Node.js 22 (for evidence sync)
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Cache pnpm store (sync deps)
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (for evidence sync)
        run: pnpm install --frozen-lockfile

      - name: Sync public evidence + scorecard (taze artifact)
        run: node scripts/sync-public-evidence.mjs

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive immutable image identity from the versioned contract
        id: image
        env:
          BUILD_VARIANT: ${{ matrix.variant }}
          BUILD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          image_ref="$(node scripts/deploy/derive-build-image-ref.mjs \
            "$BUILD_VARIANT" "$BUILD_SHA")"
          [[ "$image_ref" == "${REGISTRY}/${IMAGE_OWNER}/"* ]]
          {
            echo "ref=$image_ref"
            echo "short=${BUILD_SHA:0:7}"
            echo 'tags<<EOF'
            echo "$image_ref"
            if [[ "${GITHUB_EVENT_NAME}" == push && "${GITHUB_REF}" == refs/heads/main ]]; then
              echo "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image_name }}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build + Push image (${{ matrix.variant }})
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_KEYCLOAK_URL=${{ matrix.kc_url }}
            VITE_KEYCLOAK_REALM=${{ matrix.kc_realm }}
            VITE_KEYCLOAK_CLIENT_ID=frontend
            VITE_FRONTEND_PUBLIC_ORIGIN=${{ matrix.origin }}
            VITE_GATEWAY_URL=${{ matrix.gateway }}
            VITE_AUTH_MODE=keycloak
            VITE_AG_GRID_LICENSE_KEY=${{ secrets.AG_GRID_LICENSE_KEY }}
            VITE_MFE_ON_DEMAND_BOOTSTRAP=${{ matrix.mfe_on_demand_bootstrap }}
            VITE_NOTIFY_VAPID_PUBLIC_KEY=${{ vars.NOTIFY_VAPID_PUBLIC_KEY }}
            VITE_SHELL_ENABLE_ENDPOINT_ADMIN_REMOTE=${{ matrix.enable_endpoint_admin }}
            VITE_SHELL_ENABLE_ETHIC_REMOTE=${{ matrix.enable_ethic }}
            BUILD_SHA=${{ github.event.pull_request.head.sha || github.sha }}
            BUILD_REF=${{ github.head_ref || github.ref_name }}
            BUILD_IMAGE=${{ steps.image.outputs.ref }}
          tags: ${{ steps.image.outputs.tags }}
          # Cache scope-v2: 2026-05-03 prod variant cache-bust — eski scope
          # Vite build output'unu çakıyor, secret değişimleri yansımıyordu.
          cache-from: type=gha,scope=${{ matrix.variant }}-v2
          cache-to: type=gha,scope=${{ matrix.variant }}-v2,mode=max
          provenance: false

      # iter-50 Step 3.2 (Codex 019dded6) — testai variant SUCCESS sonra
      # platform-k8s-gitops repo'suna `repository_dispatch` event'i tetikle.
      # Sadece testai için; prod için ayrı manuel `workflow_dispatch` workflow
      # (Faz 21.6 follow-up). Secret `GITOPS_DISPATCH_PAT` fine-grained PAT,
      # `Halildeu/platform-k8s-gitops` üstünde "Contents: write" yetkisi.
      - name: Dispatch testai deploy to gitops
        if: matrix.variant == 'testai' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITOPS_DISPATCH_PAT }}
          SOURCE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::GITOPS_DISPATCH_PAT not set; skipping dispatch"
            exit 0
          fi
          FULL_IMAGE_REF="${{ steps.image.outputs.ref }}"
          IMAGE_REF="${FULL_IMAGE_REF%:*}"
          DIGEST="${{ steps.build.outputs.digest }}"
          TAG="${FULL_IMAGE_REF##*:}"
          [[ "$TAG" == "sha-${{ steps.image.outputs.short }}" ]]
          gh api repos/Halildeu/platform-k8s-gitops/dispatches \
            -X POST \
            -f event_type=testai-deploy \
            -F "client_payload[sha]=${{ github.event.pull_request.head.sha || github.sha }}" \
            -F "client_payload[short_sha]=${{ steps.image.outputs.short }}" \
            -F "client_payload[ref]=${SOURCE_REF}" \
            -F "client_payload[image]=${IMAGE_REF}" \
            -F "client_payload[image_tag]=${TAG}" \
            -F "client_payload[image_digest]=${DIGEST}"
          echo "Dispatched testai-deploy to platform-k8s-gitops"
          echo "  - sha:      ${{ github.event.pull_request.head.sha || github.sha }}"
          echo "  - tag:      ${TAG}"
          echo "  - digest:   ${DIGEST}"

      - name: Summary — digest (19.9 pin için kanıt)
        run: |
          {
            echo "### ${{ matrix.image_name }} image push (${{ matrix.variant }})"
            echo "- **Tag**: \`sha-${{ steps.image.outputs.short }}\`"
            echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`"
            echo "- **Image**: \`${{ steps.image.outputs.ref }}\`"
            echo "- **Pinnable**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}\`"
            echo "- **Build args**:"
            echo "  - VITE_KEYCLOAK_URL: \`${{ matrix.kc_url }}\`"
            echo "  - VITE_KEYCLOAK_REALM: \`${{ matrix.kc_realm }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
