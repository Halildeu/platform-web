name: CI - Web Build Check

# Faz 19.6 — Minimal web CI sanity (pnpm install + lint + build check)
# 16 legacy workflow workflows-legacy/ altında disabled (Faz 19.8+'da case-by-case enable)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  install-and-lint:
    name: pnpm install + lint (workspace root)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'

      - name: Setup pnpm (version from package.json packageManager)
        uses: pnpm/action-setup@v6

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (workspace root)
        run: pnpm run -w lint || echo "Lint warnings tolerated (Faz 19.6 baseline; 19.8'de tighten)"

      - name: M4 play function runtime verification (vitest)
        # Hard-block: 11 enriched stories' play functions must pass at runtime.
        # Closes the "fake test" risk surfaced after PR #64 (storybook build is
        # compile-only; this step actually runs play() in jsdom via composeStories).
        # Fast (~1s) and scoped — does not pull in the rest of the test suite.
        run: pnpm --filter @mfe/design-system exec vitest run src/__tests__/m4-play-verify.test.tsx

      - name: Grid architecture contract (PR-B, hard gate)
        # Source-AST scan of apps/mfe-reporting/src/** asserting no direct
        # `ag-grid-react` or `@mfe/x-data-grid` imports outside
        # `grid-architecture-exceptions.json`. The unified-grid invariant
        # was established by PR-A (Codex thread 019e7f8f cross-AI plan-time
        # consensus); PR-B (this step) is the machine-enforced gate so future
        # drift fails CI instead of code review / runtime. NO `|| echo`
        # swallow, NO `--if-present` — exit code propagates.
        run: pnpm --filter mfe-reporting run test:grid-contract
