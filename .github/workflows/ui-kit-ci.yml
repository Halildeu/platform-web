name: UI Kit - Full Quality Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'packages/design-system/**'
      - 'apps/mfe-shell/src/pages/admin/design-lab/**'
      - 'e2e/**'
      - '.storybook/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/design-system/**'
      - 'apps/mfe-shell/src/pages/admin/design-lab/**'
      - 'e2e/**'
      - '.storybook/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit + Integration Tests (Vitest) ──────────────────────────
  unit-tests:
    name: Unit Tests (2760+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: npx vitest run packages/design-system/src/ --reporter=verbose
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: coverage/
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: design-system
          directory: packages/design-system/coverage
          fail_ci_if_error: false
      - name: Upload x-suite coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: x-suite
          directory: packages/x-*/coverage
          fail_ci_if_error: false

  # ── TypeScript Type Check ──────────────────────────────────────
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type check design system
        run: npx tsc --noEmit --project packages/design-system/tsconfig.json
      - name: Type check mfe-shell
        run: npx tsc --noEmit --project apps/mfe-shell/tsconfig.json

  # ── Storybook Build ────────────────────────────────────────────
  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: npx storybook build --quiet
      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/

  # ── Storybook Interaction Tests ────────────────────────────────
  storybook-test:
    name: Storybook Interaction Tests
    runs-on: ubuntu-latest
    needs: [storybook]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Download Storybook
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
      - name: Run Storybook tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on http://localhost:6006 && pnpm test:storybook"

  # ── Playwright E2E Tests ───────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Start dev server
        run: |
          cd apps/mfe-shell
          SKIP_BACKEND_GUARD=1 npx webpack serve --config webpack.dev.js --port 3000 &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run visual regression tests
        run: npx playwright test e2e/visual/
      - name: Run interaction tests
        run: npx playwright test e2e/interaction/
      - name: Run responsive tests
        run: npx playwright test e2e/responsive/
      - name: Run a11y audit
        run: npx playwright test e2e/accessibility/
      - name: Run performance benchmarks
        run: pnpm bench:x-suite
      - name: Bundle size check
        run: |
          echo "=== Bundle Size Report ==="
          for pkg in design-system x-data-grid x-charts x-scheduler x-kanban x-editor x-form-builder; do
            if [ -d "packages/$pkg/dist" ]; then
              size=$(du -sh packages/$pkg/dist | cut -f1)
              echo "| @mfe/$pkg | $size |"
            elif [ -f "packages/$pkg/src/index.ts" ]; then
              lines=$(wc -l < packages/$pkg/src/index.ts)
              echo "| @mfe/$pkg | ${lines} lines (source) |"
            fi
          done
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diff-screenshots
          path: e2e/**/*-diff.png
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/

  # ── Browser Mode + Visual Regression Tests (Vitest 4) ────────
  browser-tests:
    name: Browser Tests (Vitest Browser Mode)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Browser mode tests
        run: pnpm test:browser
      - name: Visual regression tests
        run: pnpm test:visual
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: packages/design-system/__screenshots__/

  # ── Bundle Size Gate ───────────────────────────────────────────
  bundle-size:
    name: Bundle Size Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check bundle sizes
        run: pnpm test:bundle

  # ── Performance Benchmark Gate ─────────────────────────────────
  benchmark:
    name: Performance Benchmark Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm bench:enforce

  # ── Quality Summary ────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, type-check, storybook, storybook-test, e2e-tests, browser-tests, bundle-size, benchmark]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook | ${{ needs.storybook.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook Tests | ${{ needs.storybook-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser Tests | ${{ needs.browser-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | ${{ needs.bundle-size.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | ${{ needs.benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Enforce quality gate
        if: contains(needs.*.result, 'failure')
        run: |
          echo "❌ Quality gate FAILED"
          exit 1
