# PERF-INIT-V2 PR-G1: Route Performance Budget CI gate.
#
# Runs the PR-M1 PerformanceObserver harness via the PR-A0 bundle-attribution
# runner against a local production preview build. Outputs:
#   - tests/perf/last-run.json      (route budget artifact)
#   - tests/perf/bundle-stats/      (taxonomy + Playwright traces)
#
# Acceptance phases (PMD section 2.1 + Codex thread 019e1de0):
#   - First 2 weeks after baseline merge: warn-only, artifact upload
#   - After warmup: %5 regression fail (transfer + decoded + main-thread + TBT)
#
# Phase is controlled by `PERF_WARN_ONLY` env (default: 1 = warn-only).
# Flip to 0 after the warmup period ratifies the baseline.
#
# Hard fails:
#   - Lighthouse accessibility < 0.9
#   - Lighthouse best-practices < 0.85
#   - Bundle build error
#   - Auth-fail when targeting authenticated routes without storage state

name: PR Performance Budget (PR-G1)

on:
  pull_request:
    paths:
      - 'apps/mfe-shell/**'
      - 'packages/**'
      - 'performance-budgets.json'
      - 'scripts/ci/route-performance-budget.mjs'
      - 'scripts/ci/lib/route-budget-evaluate.mjs'
      - 'scripts/ci/__tests__/route-budget-evaluate.test.mjs'
      - 'scripts/ci/bundle-taxonomy.mjs'
      - 'scripts/ci/duplicate-package-detector.mjs'
      - 'scripts/ci/css-attribution-breakdown.mjs'
      - 'scripts/vite-plugins/bundle-visualizer.ts'
      - 'tests/perf/baseline.json'
      - 'tests/perf/route-budget.spec.ts'
      - '.lighthouserc.json'
      - '.github/workflows/perf-budget.yml'
  workflow_dispatch:
    inputs:
      warn_only:
        description: 'Warn-only mode (no hard fail on budget regression)'
        required: false
        default: '1'

env:
  # Default to warn-only during the PR-G1 warmup. After 2 weeks + baseline
  # ratification, flip this to '0' to enable %5 regression hard fail.
  PERF_WARN_ONLY: ${{ inputs.warn_only || '1' }}
  PERF_TARGET: local
  PERF_RUNS: '3'

jobs:
  perf-budget:
    name: route budget + bundle taxonomy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json `packageManager` field
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build mfe-shell (production preview)
        # PERF-INIT-V2.1 perf-pipeline fix: this gate serves a STANDALONE shell
        # preview with no MFE remote dev servers. Eager mode emits synchronous
        # remoteEntry.js fetches (localhost:300x) at bootstrap →
        # ERR_CONNECTION_REFUSED → the app fails to paint (NO_FCP) →
        # perf-observer never attaches window.__perfSnapshot. The on-demand
        # build omits remotes from the federation manifest so the standalone
        # preview renders; the measured /login route is shell-only.
        env:
          MFE_ON_DEMAND_BOOTSTRAP: '1'
        run: pnpm --filter mfe-shell build

      - name: Serve production preview (SPA-aware Vite preview, port 5174)
        run: |
          # Vite preview understands SPA history fallback (avoids 404 on
          # client-side routes like /login). Background process; CI step
          # cleanup happens via runner.
          pnpm --dir apps/mfe-shell exec vite preview \
            --host 127.0.0.1 --port 5174 --strictPort --outDir dist &
          # Wait up to 60s for server to accept connections
          deadline=$(( $(date +%s) + 60 ))
          until curl -fsI "http://127.0.0.1:5174/login" >/dev/null 2>&1; do
            if [ $(date +%s) -ge "${deadline}" ]; then
              echo "FATAL: preview server did not respond within 60s"
              exit 1
            fi
            sleep 1
          done
          echo "preview server ready"
        shell: bash

      - name: Route budget (warn-only via flag; failures NOT muted)
        # Codex thread 019e1e5d critical 4: `--warn-only` already downgrades
        # budget failures to exit 0. Removing `|| true` so infra crashes
        # (runner import error, Playwright launch fail) surface as red.
        run: |
          if [ "${PERF_WARN_ONLY}" = "1" ]; then
            pnpm exec node scripts/ci/route-performance-budget.mjs --target local --runs "${PERF_RUNS}" --warn-only --routes /login
          else
            pnpm exec node scripts/ci/route-performance-budget.mjs --target local --runs "${PERF_RUNS}" --require-baseline --routes /login
          fi

      - name: Bundle taxonomy (anonymous /login smoke, advisory)
        # Advisory: bundle-taxonomy implementation regressions are visible
        # in red but do not block the PR.
        continue-on-error: true
        run: |
          pnpm exec node scripts/ci/bundle-taxonomy.mjs --target local --routes /login --runs 1

      - name: Duplicate package detector (advisory)
        continue-on-error: true
        run: |
          ANALYZE_BUNDLE=1 pnpm --filter mfe-shell build
          pnpm exec node scripts/ci/duplicate-package-detector.mjs

      # PERF-INIT-V2 PR-B3d0-impl (Codex thread 019e276d blocking-1 absorb):
      # CSS attribution (build-time, source-map-explorer) runs AFTER runtime
      # measurement so the sourcemap-enabled analysis build does not
      # contaminate the route-budget / bundle-taxonomy runtime captures
      # above (those measure the default production preview build at port
      # 5174). The CSS_ATTRIBUTION=1 build is a separate dist rebuild,
      # consumed by source-map-explorer only.
      - name: CSS attribution audit (build-time, advisory)
        continue-on-error: true
        run: |
          CSS_ATTRIBUTION=1 pnpm --filter mfe-shell build
          pnpm perf:css-breakdown

      - name: Upload route budget artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-budget-${{ github.run_id }}
          path: |
            tests/perf/last-run.json
            tests/perf/bundle-stats/
            docs/performance/css-breakdown.html
            docs/performance/css-breakdown.json
          retention-days: 30

  size-limit:
    name: size-limit (entry regression)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json `packageManager` field
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build mfe-shell for size-limit
        run: pnpm --filter mfe-shell build

      - name: Run size-limit
        run: pnpm test:bundle

  lighthouse-ci:
    name: lighthouse-ci (production preview, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json `packageManager` field
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build mfe-shell (production preview)
        # PERF-INIT-V2.1 perf-pipeline fix: this gate serves a STANDALONE shell
        # preview with no MFE remote dev servers. Eager mode emits synchronous
        # remoteEntry.js fetches (localhost:300x) at bootstrap →
        # ERR_CONNECTION_REFUSED → the app fails to paint (NO_FCP) →
        # perf-observer never attaches window.__perfSnapshot. The on-demand
        # build omits remotes from the federation manifest so the standalone
        # preview renders; the measured /login route is shell-only.
        env:
          MFE_ON_DEMAND_BOOTSTRAP: '1'
        run: pnpm --filter mfe-shell build

      - name: Install Chrome for Lighthouse
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Lighthouse CI
        run: pnpm lighthouse:ci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN || '' }}

  # PERF-INIT-V2.1 dual budget Phase 2: pure evaluation-core unit tests.
  # Mirrors gate-perf-drift.yml's `unit-tests` job pattern. The lib + test
  # are dependency-free (no Playwright graph), so this runs install-free.
  unit-tests:
    name: route-budget evaluate unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run route-budget-evaluate unit tests
        run: node --test scripts/ci/__tests__/route-budget-evaluate.test.mjs
