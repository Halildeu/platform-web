name: x-charts Mutation Testing (advisory)

# Faz 21.9 PR3j (Codex thread `019defa5`).
#
# Runs Stryker mutation testing against the pure-function surface of
# `@mfe/x-charts` (responsive helpers, chartSize, cross-filter store).
# Currently advisory only — never blocks merge — so the first 2-3 runs
# can establish a real baseline before we tighten the threshold.
#
# Triggers
# - `workflow_dispatch`: anyone can run it on demand from the Actions tab
# - Nightly schedule (UTC 04:00 = TR 07:00) so the baseline doesn't
#   silently rot. Codex review explicit: "İlk PR'da hard gate'e ekleme.
#   workflow_dispatch veya nightly/advisory başlat."
#
# Reports
# - HTML mutation report uploaded as a workflow artifact (30-day
#   retention) so reviewers can drill into surviving mutants.
# - Console summary surfaces the killed/survived/timeout counts inline.
#
# Promotion path
# After 2-3 successful runs surface a real baseline:
#   1. Raise `break: 10` in stryker.config.mjs to a value that reflects
#      the steady-state score
#   2. Move this workflow into `x-charts-quality-gates.yml` as a hard
#      gate, or keep advisory and reference it from CONTRACT.md §8

on:
  workflow_dispatch:
    inputs:
      mutate_subset:
        description: 'Optional --mutate filter (e.g. src/responsive/**)'
        required: false
        default: ''
        type: string
  schedule:
    # Nightly at 04:00 UTC (07:00 TR) — runs against main HEAD.
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: x-charts-mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Stryker mutation (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Soft gate — never block downstream workflows on mutation results.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile

      - name: Run Stryker mutation analysis
        working-directory: packages/x-charts
        env:
          # Stryker incremental cache speeds repeat runs; per-PR scope
          # would also benefit but workflow_dispatch keeps it main-only
          # for now.
          STRYKER_INCREMENTAL: '1'
        run: |
          if [ -n "${{ inputs.mutate_subset }}" ]; then
            echo "::notice::Running Stryker on subset: ${{ inputs.mutate_subset }}"
            pnpm exec stryker run --mutate "${{ inputs.mutate_subset }}"
          else
            pnpm exec stryker run
          fi

      - name: Upload HTML mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: x-charts-mutation-report-${{ github.run_id }}
          path: packages/x-charts/reports/mutation/
          retention-days: 30
          if-no-files-found: warn

      - name: Append summary
        if: always()
        run: |
          echo "## x-charts mutation testing — advisory" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Stryker baseline run. Soft gate: never blocks merge." >> "$GITHUB_STEP_SUMMARY"
          if [ -f packages/x-charts/reports/mutation/index.html ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Full HTML report attached as artifact \`x-charts-mutation-report-${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No HTML report generated — check the job log for Stryker errors." >> "$GITHUB_STEP_SUMMARY"
          fi
