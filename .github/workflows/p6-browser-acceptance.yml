name: P6 Browser Acceptance

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/p6-browser-acceptance.yml'
      - 'apps/mfe-interview-evidence/src/**'
      - 'apps/mfe-interview-evidence/vite.config.ts'
      - 'apps/mfe-shell/src/index.css'
      - 'e2e/interaction/p6-*.spec.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'playwright.p6.config.ts'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/p6-browser-acceptance.yml'
      - 'apps/mfe-interview-evidence/src/**'
      - 'apps/mfe-interview-evidence/vite.config.ts'
      - 'apps/mfe-shell/src/index.css'
      - 'e2e/interaction/p6-*.spec.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'playwright.p6.config.ts'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p6-browser-acceptance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  p6-browser-acceptance:
    name: P6 desktop + exact 390px (Chromium)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.12'
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify production host-only build
        run: pnpm --filter mfe-interview-evidence build
      - name: Reject standalone acceptance mode in production build
        run: |
          if VITE_MFE_INTERVIEW_EVIDENCE_STANDALONE_ACCEPTANCE=1 pnpm --filter mfe-interview-evidence build; then
            echo 'Acceptance-only shared fallbacks entered the production build.' >&2
            exit 1
          fi
      - name: Install Chromium runtime
        run: pnpm exec playwright install --with-deps chromium
      - name: Run self-contained P6 browser acceptance
        run: pnpm e2e:p6:acceptance
      - name: Upload browser acceptance evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: p6-browser-acceptance-${{ github.run_attempt }}
          path: |
            playwright-report-p6
            test-results/p6-acceptance
          if-no-files-found: warn
          retention-days: 7
