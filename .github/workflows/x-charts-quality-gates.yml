name: x-charts Quality Gates

# Faz 21.4 PR-F target: 8 CONTRACT v2.1 §8 CI gates
#   bundle / axe / contrast / xss / memory / spec / visual / tree-shake
#
# This workflow after PR-F2 — 7 PR-F gates active as hard-blocks:
#   chart-spec, xss, memory, axe (NEW PR-F1), contrast (NEW PR-F1),
#   tree-shake (NEW PR-F1), bundle-size (NEW PR-F2)
# Plus PR-D regression guard: chart-component-baseline (smoke + options-shape + access-contract)
#   — NOT one of PR-F's 8 gates; separate D-level regression layer.
#
# Other PR-F gates active in separate workflows:
#   visual-regression: `x-charts-visual-gate.yml` (HARD)
#
# CI overall after PR-F2: 8/8 PR-F gates HARD active.
#
# component-scorecard is the 9th item in CONTRACT §8 and runs in
# `scorecard-gate.yml` (already active per PR-A); NOT counted in PR-F's 8.

on:
  push:
    branches: [main]
    paths:
      - 'packages/x-charts/**'
      - 'packages/shared-types/**'
      - 'scripts/ci/verify-tree-shaking.mjs'
      - '.github/workflows/x-charts-quality-gates.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/x-charts/**'
      - 'packages/shared-types/**'
      - 'scripts/ci/verify-tree-shaking.mjs'
      - '.github/workflows/x-charts-quality-gates.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chart-spec-validation:
    name: chart-spec-validation (CONTRACT §8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run chart-spec validation tests (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/spec-transform.contract.test.tsx \
            --reporter=verbose

  xss-sanitization-check:
    name: xss-sanitization-check (CONTRACT §8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run XSS sanitization tests (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/security.contract.test.tsx \
            --reporter=verbose

  memory-leak-test:
    name: memory-leak-test (CONTRACT §8)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run memory leak tests (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/memory-leak.test.tsx \
            --reporter=verbose

  chart-component-baseline:
    name: chart-component-baseline (PR-D regression guard)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PR-D (#103) merged the smoke test file to main; this job runs
    # unconditionally now. (Prior `if: hashFiles(...)` job-level guard
    # removed — actionlint flagged it as not allowed at job scope.)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run 13-chart smoke + option-shape + access contract (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/chart-components-smoke.test.tsx \
            src/__tests__/chart-options-shape.test.tsx \
            src/__tests__/access.contract.test.tsx \
            --reporter=verbose

  axe-audit:
    name: a11y-axe-audit (CONTRACT §8 axe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      # `chart-axe.test.tsx` disables `color-contrast` rule under jsdom (CSS
      # variable resolution doesn't work in jsdom — see file header). The
      # contrast contract gate below covers that dimension via theme-builder
      # palette math instead.
      - name: Run axe-core audits (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/chart-axe.test.tsx \
            --reporter=verbose

  contrast-ratio-check:
    name: contrast-ratio-check (CONTRACT §8 contrast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      # Two-pronged contrast gate (PR-F1):
      #   (1) chart-contrast.contract — STATIC fallback theme-object
      #       contrast math for text/control elements (4.5:1 across 5
      #       themes × 7 surfaces). Theme builders read CSS custom
      #       properties via getComputedStyle at build time; in jsdom
      #       the shell theme.css isn't loaded so builders fall back to
      #       hard-coded hex defaults. This gate locks the FALLBACK
      #       layer — what consumers see during initial paint flash,
      #       Storybook standalone, snapshot tools. Runtime browser
      #       OKLCH/CSS-var token resolution is a separate Playwright
      #       follow-up, not gated here.
      #   (2) chart-theme-decal — runtime decal/aria fallback
      #       structural check for high-contrast and print themes
      #       (CONTRACT §1.1).
      # Series palette adjacency contrast is intentionally NOT gated;
      # series differentiation comes from layout, decal, legend, and
      # markers, not numerical adjacent-color ratio.
      - name: Run contrast ratio + decal fallback (hard block)
        run: |
          pnpm --filter @mfe/x-charts exec vitest run \
            src/__tests__/chart-contrast.contract.test.ts \
            src/__tests__/chart-theme-decal.test.tsx \
            --reporter=verbose

  tree-shaking-verify:
    name: tree-shaking-verify (CONTRACT §8 tree-shake)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      # Descriptor-driven verification — DS uses dist-mode (built artifact),
      # x-charts uses source-mode (no dist; entry is src/index.ts).
      # Both share scripts/ci/verify-tree-shaking.mjs; per-package descriptor
      # supplies entry path, allowed side-effect files, expected exports.
      - name: Verify x-charts tree-shaking (hard block)
        run: node scripts/ci/verify-tree-shaking.mjs --package x-charts

  bundle-size-check:
    name: bundle-size-check (CONTRACT §8 bundle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install
        run: pnpm install --frozen-lockfile
      # Esbuild source-analyze (no real `dist/`; x-charts ships source-only).
      # Two synthesised bundles per CONTRACT §7:
      #   wrapperOnly   — ECharts external; soft observability
      #   contractTotal — ECharts included; HARD threshold = min(350KB, baseline×1.2)
      # Baseline lives at packages/x-charts/.bundle-baseline.json.
      # Manual rotate via `--update-baseline` + commit (NEVER auto-rotated by CI).
      - name: Bundle size check (hard block on contractTotal)
        run: node scripts/ci/x-charts-bundle-check.mjs
