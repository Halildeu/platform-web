name: Deploy testai

# Faz 21.5-A1.3 — testai.acik.com auto-deploy.
#
# Trigger: every successful "CI - Web Image Build + GHCR Push" run on main
# pushes the new image tag (sha-<7>) into the testai cluster (k3d-test) +
# rsyncs the bundle into the host nginx static dir served at
# https://testai.acik.com.
#
# Why both k8s pod AND host static rsync?
#   - testai.acik.com is fronted by `platform-web-nginx-stage` Docker
#     container on staging-sw which serves /usr/share/nginx/html from a
#     bind-mounted release directory (`releases/<sha>`). The k3d-test
#     cluster is only used for backend services and remote MFEs.
#   - Until the host nginx is rewired to consume the k3d ingress, every
#     frontend deploy must update both surfaces.
#
# Promotion to prod: manual `deploy-prod.yml` (Faz 21.6 follow-up).
# This workflow MUST NOT touch k3d-prod or ai.acik.com.
#
# Required secrets:
#   - STAGING_SW_SSH_KEY: private key (ed25519) authorized for
#     halil@staging-sw.
#   - STAGING_SW_KNOWN_HOSTS (optional): public host key for staging-sw;
#     falls back to ssh-keyscan if missing.

on:
  workflow_run:
    workflows: ['CI - Web Image Build + GHCR Push']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-1093d2f)'
        required: false

permissions:
  contents: read

env:
  SSH_HOST: staging-sw
  SSH_USER: halil
  K8S_CONTEXT: k3d-test
  K8S_NAMESPACE: platform-test
  K8S_DEPLOYMENT: frontend
  K8S_LABEL_SELECTOR: app.kubernetes.io/name=frontend
  TESTAI_URL: https://testai.acik.com
  HOST_RELEASES_DIR: /home/halil/platform/web-stage/releases
  HOST_NGINX_MOUNT_DIR: /home/halil/platform/web-stage/releases/ac35567
  IMAGE_NAME: ghcr.io/halildeu/platform-web-frontend-testai

jobs:
  deploy:
    name: Deploy testai (k8s pod + host static)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            TAG="sha-${SHA:0:7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${TAG}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SW_SSH_KEY }}

      - name: Add staging-sw to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${{ secrets.STAGING_SW_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.STAGING_SW_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy k3d-test pod (kubectl set image)
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}:${{ steps.tag.outputs.tag }}"
          # shellcheck disable=SC2029  # Client-side expansion is intentional for ssh.
          ssh "${SSH_USER}@${SSH_HOST}" \
            "kubectl --context='${K8S_CONTEXT}' set image deployment/'${K8S_DEPLOYMENT}' \
              ${K8S_DEPLOYMENT}=${IMAGE} -n '${K8S_NAMESPACE}'"
          # shellcheck disable=SC2029
          ssh "${SSH_USER}@${SSH_HOST}" \
            "kubectl --context='${K8S_CONTEXT}' rollout status deployment/'${K8S_DEPLOYMENT}' \
              -n '${K8S_NAMESPACE}' --timeout=300s"

      - name: Sync host nginx static (kubectl cp + rsync)
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          SHA_SHORT="${TAG#sha-}"
          REMOTE_TMP="/tmp/web-deploy-${SHA_SHORT}-${GITHUB_RUN_ID}"
          REMOTE_RELEASE="${HOST_RELEASES_DIR}/${SHA_SHORT}"

          # shellcheck disable=SC2087  # Client-side expansion of GH-runner env is intentional.
          ssh "${SSH_USER}@${SSH_HOST}" bash -s <<EOF
          set -euo pipefail

          # 1. Find the running pod (post-rollout, fresh pod).
          POD=\$(kubectl --context='${K8S_CONTEXT}' get pod -n '${K8S_NAMESPACE}' \
            -l '${K8S_LABEL_SELECTOR}' \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Source pod: \$POD"

          # 2. Pull the static bundle out of the new pod.
          rm -rf '${REMOTE_TMP}'
          kubectl --context='${K8S_CONTEXT}' cp \
            '${K8S_NAMESPACE}/'"\$POD"':/usr/share/nginx/html' \
            '${REMOTE_TMP}'

          # 3. Materialize the new release directory.
          mkdir -p '${REMOTE_RELEASE}'
          rsync -a --delete '${REMOTE_TMP}/' '${REMOTE_RELEASE}/'
          rm -rf '${REMOTE_TMP}'

          # 4. Update the 'current' symlink.
          ln -snf '${REMOTE_RELEASE}' /home/halil/platform/web-stage/current

          # 5. In-place refresh of the actually-mounted directory.
          #    The platform-web-nginx-stage container mount is hard-coded
          #    to releases/ac35567. Until the container is rewired to
          #    follow 'current', mirror the new release into that path so
          #    nginx serves it without a container restart.
          rsync -a --delete '${REMOTE_RELEASE}/' '${HOST_NGINX_MOUNT_DIR}/'

          echo 'Host static deploy complete. Release: ${REMOTE_RELEASE}'
          EOF

      - name: Smoke test (chart routes + bundle integrity)
        run: |
          set -e
          fail=0

          for slug in cross-filter area-chart scatter-chart sunburst-chart bar-chart; do
            status=$(curl -sko /dev/null -w '%{http_code}' "${TESTAI_URL}/admin/design-lab/charts/${slug}")
            echo "GET /admin/design-lab/charts/${slug} -> ${status}"
            if [ "${status}" != "200" ]; then
              echo "::error::Smoke fail on /${slug} (HTTP ${status})"
              fail=1
            fi
          done

          # Verify the entry bundle hash actually changed (Last-Modified
          # is updated by the rsync step above).
          last_mod=$(curl -skI "${TESTAI_URL}/index.html" | tr -d '\r' | awk -F': ' '/^Last-Modified/{print $2}')
          echo "index.html Last-Modified: ${last_mod}"

          exit ${fail}

      - name: Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## testai Deploy Summary

          - **Image tag:** \`${{ steps.tag.outputs.tag }}\`
          - **Cluster:** \`${K8S_CONTEXT}\` / namespace \`${K8S_NAMESPACE}\`
          - **Deployment:** \`${K8S_DEPLOYMENT}\`
          - **URL:** ${TESTAI_URL}
          - **Trigger:** \`${{ github.event_name }}\`

          ### Manual prod promotion
          Production (\`ai.acik.com\`) is **not** auto-promoted by this workflow.
          Promotion requires explicit user approval via a separate \`deploy-prod.yml\`
          workflow (Faz 21.6 follow-up).

          To dry-run a manual deploy of any image tag:
          \`\`\`bash
          gh workflow run deploy-testai.yml -f image_tag=<sha-XXXXXXX>
          \`\`\`
          EOF
