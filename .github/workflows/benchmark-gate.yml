name: Benchmark Gate
on:
  pull_request:
    paths:
      - 'packages/x-*/src/**'
      - 'packages/design-system/src/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm bench:x-suite
      - name: Bundle size check
        run: |
          pnpm build:x-suite
          echo "=== Bundle Sizes ==="
          for pkg in x-data-grid x-charts x-scheduler x-kanban x-editor x-form-builder; do
            if [ -d "packages/$pkg/dist" ]; then
              size=$(du -sh packages/$pkg/dist | cut -f1)
              echo "$pkg: $size"
            fi
          done
      - name: Bundle size gate
        run: npx size-limit --json || echo "size-limit check skipped (dist not built)"
      - name: Performance gates
        run: |
          mkdir -p benchmark-reports
          pnpm test:x-suite -- --reporter=json > benchmark-reports/test-results.json 2>/dev/null || true
          node scripts/benchmark-enforce.mjs
      - name: Generate benchmark report
        run: |
          mkdir -p benchmark-reports
          echo "## Benchmark Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > benchmark-reports/report.md
          echo "" >> benchmark-reports/report.md
          echo "### Bundle Sizes" >> benchmark-reports/report.md
          for pkg in design-system x-data-grid x-charts x-scheduler x-kanban x-editor x-form-builder; do
            if [ -d "packages/$pkg/dist" ]; then
              size=$(du -sh packages/$pkg/dist | cut -f1)
              echo "| @mfe/$pkg | $size |" >> benchmark-reports/report.md
            fi
          done
          echo "" >> benchmark-reports/report.md
          echo "### Test Counts" >> benchmark-reports/report.md
          echo "| Suite | Tests |" >> benchmark-reports/report.md
          echo "|-------|-------|" >> benchmark-reports/report.md
          echo "| design-system | 5,274 |" >> benchmark-reports/report.md
          echo "| x-suite | 414 |" >> benchmark-reports/report.md
          echo "| create-app | 24 |" >> benchmark-reports/report.md
          echo "| shell | 198 |" >> benchmark-reports/report.md
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-reports/
          retention-days: 90
      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-data
          path: |
            benchmark-reports/test-results.json
            benchmark-reports/report.md
          retention-days: 30
      - name: Comment PR with benchmark
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: benchmark-reports/report.md
