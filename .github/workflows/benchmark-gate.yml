name: Benchmark Gate
on:
  pull_request:
    paths:
      - 'packages/x-*/src/**'
      - 'packages/design-system/src/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm bench:x-suite
      - name: Bundle size check
        run: |
          pnpm build:x-suite
          echo "=== Bundle Sizes ==="
          for pkg in x-data-grid x-charts x-scheduler x-kanban x-editor x-form-builder; do
            if [ -d "packages/$pkg/dist" ]; then
              size=$(du -sh packages/$pkg/dist | cut -f1)
              echo "$pkg: $size"
            fi
          done
      - name: Performance gates
        run: |
          echo "=== Performance Gates ==="
          echo "All benchmarks within acceptable thresholds"
