name: Faz 25 P5 Deployment Readiness

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: faz25-p5-deployment-readiness-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  canonical-contract-and-browser:
    name: Canonical 4x8 Contract + Browser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_AUTH_MODE: permitAll
      VITE_ENABLE_FAKE_AUTH: '1'
      VITE_FAKE_AUTH_PERMISSIONS: ADMIN,INTERVIEW_EVIDENCE
      VITE_SHELL_ENABLE_INTERVIEW_EVIDENCE_REMOTE: '1'
      VITE_SHELL_ENABLE_ENDPOINT_ADMIN_REMOTE: '1'
      MFE_ENDPOINT_ADMIN_URL: 'data:text/javascript,export function init(){};export function get(){return Promise.resolve(function(){return{default:null,configureShellServices:function(){}}})};export default{init,get};export function configureShellServices(){}'
      VITE_SHELL_ENABLE_SUGGESTIONS_REMOTE: '0'
      VITE_SHELL_ENABLE_ETHIC_REMOTE: '0'
      VITE_SHELL_ENABLE_ACCESS_REMOTE: '0'
      VITE_SHELL_ENABLE_AUDIT_REMOTE: '0'
      VITE_SHELL_ENABLE_USERS_REMOTE: '0'
      VITE_SHELL_ENABLE_REPORTING_REMOTE: '0'
      VITE_SHELL_ENABLE_SCHEMA_EXPLORER_REMOTE: '0'
      VITE_SHELL_ENABLE_MEETING_REMOTE: '0'
      P5_DEPLOYMENT_READINESS_E2E: '1'
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile

      - name: Lint, unit contract and production build
        run: |
          pnpm --filter mfe-interview-evidence lint
          pnpm --filter mfe-interview-evidence test
          pnpm --filter mfe-interview-evidence build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start isolated shell + interview-evidence harness
        run: |
          pnpm --filter mfe-interview-evidence exec vite --host 127.0.0.1 --port 3011 > /tmp/p5-mfe.log 2>&1 &
          pnpm --filter mfe-shell exec vite --host 127.0.0.1 --port 3000 > /tmp/p5-shell.log 2>&1 &
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3011/remoteEntry.js >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000/admin/interview-evidence >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          tail -n 200 /tmp/p5-mfe.log || true
          tail -n 200 /tmp/p5-shell.log || true
          exit 1

      - name: Chromium product acceptance (keyboard, 390px, Axe)
        run: >-
          pnpm exec playwright test
          tests/playwright/faz25-p5-deployment-readiness.spec.ts
          --config tests/playwright/playwright.config.ts
          --project=chromium
          --workers=1

      - name: Upload browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: faz25-p5-browser-diagnostics
          if-no-files-found: ignore
          path: |
            /tmp/p5-mfe.log
            /tmp/p5-shell.log
            test-results/
            playwright-report/
