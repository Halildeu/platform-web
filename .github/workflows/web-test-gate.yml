name: Web Test Gate

# Foundation gate — see docs/architecture/frontend/adr-test-environment-strategy.md
#
# Required jobs (branch protection points to the aggregator below):
#   - unit-required          — Vitest jsdom across the workspace
#   - token-drift-required   — tokens:build --check + tokens:build:theme --check
#   - cssom-canary-required  — curated manifest: Tailwind layer sentinel +
#                              ThemeProvider + 13 primitives (Button, Input,
#                              Checkbox, Switch, Radio, Card, Dialog,
#                              Drawer, Tooltip, Alert, Skeleton, Spinner,
#                              Avatar). PR-9 first cutover, PR-10 added
#                              Radio after a11y fix, PR-11 added Card
#                              variant-token lock, PR-12 added Dialog +
#                              Drawer (also fixed a production backdrop bug
#                              — bg-surface-inverse/40 was unregistered),
#                              PR-14 added Tooltip + Alert (inverted-color
#                              cascade + state-variant matrix), PR-16 added
#                              Skeleton + Spinner + Avatar (loading-state
#                              cascade locks).
#
# Advisory jobs (run, but do not block merge by default):
#   - cssom-full-advisory          — full *.cssom.test.{ts,tsx} suite
#   - lint-warn-visibility-advisory — DS ESLint warning report (PR-2B-3,
#                                     Codex thread 019df8cc): surfaces
#                                     warn-only rules (e.g. PR-1
#                                     test-environment plugin) without
#                                     blocking merge. Fails only on infra
#                                     errors, not on warning count.
#
# Aggregator:
#   - web-test-gate-required — `needs:` against the required set; this is the
#                              single check pinned in branch protection. When
#                              repo variable STRICT_GATES=true, the aggregator
#                              also fails on advisory infra failure (NOT on
#                              warning count — see lint advisory comment).
#
# This workflow does not yet cover *.visual.test (L4) or full *.browser.test
# migration. Those are scoped to subsequent PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'run = normal gate; invariant-baseline = regenerate Linux invariant snapshots and upload as artifact (no auto-commit)'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - invariant-baseline

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-required:
    name: Unit (jsdom)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Vitest workspace (jsdom)
        run: pnpm run test:workspace
      - name: mfe-meeting ws-stream consumer contract
        run: pnpm --filter mfe-meeting run contract:ws-stream
      - name: Vitest mfe-reporting SSRM response contract + dynamic-report
        # Root vitest.config.ts intentionally excludes apps/mfe-reporting
        # from the workspace project list (chart fixture isolation), so
        # tests added under that package wouldn't otherwise run in the
        # required gate. PR #273 (SSRM POST /query data path) added
        # fetchReportData routing tests; expose them to CI so the
        # structured-error contract stays locked.
        #
        # Path-scoped to src/modules/dynamic-report — the package also
        # carries pre-existing `node:test`-based tests under
        # src/lib/grid-variants/__tests__ which are NOT compatible with
        # vitest and were never run in the workspace gate (root `test`
        # script omits mfe-reporting entirely). Migrating those files
        # to vitest is a separate cleanup PR; for now we keep this CI
        # step narrowly scoped so the PR-0.2 contract stays locked
        # without dragging unrelated tech debt into this gate.
        #
        # SSRM response contract (Codex thread 019e3a61): the
        # normalizeSsrmSuccessPayload helper unit test (src/grid) and the
        # cross-group module contract test (src/modules/__tests__) are
        # included here so the "satır yok" whack-a-mole regression guard
        # actually runs in the required gate, not just locally.
        #
        # hr-demographic-report/__tests__/api-filter.test.ts (Codex thread
        # 019e3b64): the İK demografik grid live-Workcube wiring — request
        # mapping + row mapping + auth gate + the route↔backend-key dedup
        # invariant — runs in the gate so a regression to the empty grid
        # or a duplicate dynamic-report route fails CI.
        #
        # DemographicDashboard.contract.test.tsx (Codex thread 019e3c78):
        # the İK demografik dashboard — KPI strip + chart-card contract —
        # runs in the gate so the ethics/pay-equity live-chart wiring +
        # mock-metric removal stay regression-guarded.
        run: pnpm --filter mfe-reporting exec vitest run src/modules/dynamic-report src/grid/ssrm-response.test.ts src/modules/__tests__/report-module.contract.test.ts src/app/services/__tests__/shell-services.test.ts src/modules/hr-demographic-report/__tests__/api-filter.test.ts src/modules/hr-demographic-report/__tests__/DemographicDashboard.contract.test.tsx

  token-drift-required:
    name: Token Drift (build --check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Token drift gate (build artifacts and theme CSS)
        run: pnpm run tokens:drift

  semantic-layer-required:
    name: Semantic Layer (no-raw-hex)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Semantic-layer no-raw-hex gate (theme/core/*.ts)
        run: pnpm --filter @mfe/design-system run semantic-layer-no-raw-hex:ci

  cssom-canary-required:
    name: CSSOM Canary (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium (browser provider runtime)
        run: pnpm exec playwright install --with-deps chromium
      - name: CSSOM canary suite (Tailwind layer + ThemeProvider + 13 primitives)
        run: pnpm run test:cssom:canary

  cssom-full-advisory:
    name: CSSOM Full (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NOTE: do NOT use job-level `continue-on-error: true` here.
    # GitHub Actions masks the true failure result behind `needs.X.result`
    # when the job is marked continue-on-error, which would defeat
    # STRICT_GATES result-readback in the aggregator. Instead, the run
    # step uses `continue-on-error: true` and writes a job output that
    # the aggregator reads directly.
    outputs:
      cssom_full_outcome: ${{ steps.cssom_full_run.outcome }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: CSSOM full suite (advisory — failure does not block merge)
        id: cssom_full_run
        continue-on-error: true
        run: pnpm run test:cssom:full
      - name: Upload Vitest report on failure
        if: steps.cssom_full_run.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: cssom-full-report
          path: |
            packages/design-system/.vitest-output
            packages/design-system/test-results

  lint-warn-visibility-advisory:
    name: DS Lint Warnings (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same pattern as cssom-full-advisory: NO job-level continue-on-error.
    # Only the lint run step uses continue-on-error so warning count never
    # fails the job; infra issues (install, parse, comment script) do.
    # Aggregator reads `lint_advisory_outcome` for STRICT_GATES infra check.
    outputs:
      lint_advisory_outcome: ${{ steps.lint_run.outcome }}
      total_warnings: ${{ steps.summarize.outputs.total_warnings }}
      test_env_warnings: ${{ steps.summarize.outputs.test_env_warnings }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history for changed-file diff against base.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile

      - name: Run DS ESLint (JSON output, warnings tolerated)
        id: lint_run
        continue-on-error: true
        working-directory: packages/design-system
        run: |
          # `--max-warnings 100000` keeps ESLint exit non-zero only on real
          # parse/config errors, not on warning count. JSON output is parsed
          # in the next step. Output written to ../../eslint-report.json so
          # the artifact upload picks it up at repo root.
          ../../node_modules/.bin/eslint \
            --config eslint.config.mjs \
            --format json \
            --max-warnings 100000 \
            src \
            > ../../eslint-report.json || true

      - name: Summarize warnings (filter severity 1, count test-env)
        id: summarize
        run: |
          set -euo pipefail
          if [[ ! -s eslint-report.json ]]; then
            echo "::error::eslint-report.json missing or empty — lint run produced no output"
            exit 1
          fi
          # severity 1 = warning, severity 2 = error.
          # Total warnings, test-environment warnings, top rules, top files.
          summary=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
            let total = 0;
            let testEnv = 0;
            let errors = 0;
            const ruleCounts = {};
            const fileCounts = {};
            for (const file of data) {
              for (const m of file.messages) {
                if (m.severity === 1) {
                  total++;
                  const rule = m.ruleId || 'unknown';
                  ruleCounts[rule] = (ruleCounts[rule] || 0) + 1;
                  fileCounts[file.filePath] = (fileCounts[file.filePath] || 0) + 1;
                  if (rule.startsWith('test-environment/')) testEnv++;
                } else if (m.severity === 2) {
                  errors++;
                }
              }
            }
            const result = {
              total,
              testEnv,
              errors,
              topRules: Object.entries(ruleCounts).sort((a, b) => b[1] - a[1]).slice(0, 10),
              topFiles: Object.entries(fileCounts).sort((a, b) => b[1] - a[1]).slice(0, 10),
            };
            console.log(JSON.stringify(result));
          ")
          echo "$summary" > eslint-summary.json
          total=$(node -e "console.log(JSON.parse(require('fs').readFileSync('eslint-summary.json', 'utf8')).total)")
          test_env=$(node -e "console.log(JSON.parse(require('fs').readFileSync('eslint-summary.json', 'utf8')).testEnv)")
          errors=$(node -e "console.log(JSON.parse(require('fs').readFileSync('eslint-summary.json', 'utf8')).errors)")
          # Block-grouped redirect (ShellCheck SC2129): single open of
          # $GITHUB_OUTPUT instead of three sequential `>>` redirects.
          {
            echo "total_warnings=$total"
            echo "test_env_warnings=$test_env"
            echo "ignored_errors=$errors"
          } >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== ESLint Warning Summary (DS) ==="
          echo "Total warnings:   $total"
          echo "Test-env warnings: $test_env"
          echo "Ignored errors:   $errors (separate debt — not part of this advisory)"

      - name: Compute changed-file warnings (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # List DS source files changed by this PR.
          mapfile -t changed < <(
            git diff --name-only "$base" "$head" -- 'packages/design-system/src/**/*.ts' 'packages/design-system/src/**/*.tsx' \
              | sed 's|^packages/design-system/||'
          )
          echo "Changed DS files: ${#changed[@]}"
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "changed_warnings=0" >> "$GITHUB_OUTPUT"
            echo "[]" > eslint-changed.json
          else
            # Filter eslint-report.json to changed files only, count warnings.
            printf '%s\n' "${changed[@]}" > changed-files.txt
            count=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
              const changedSet = new Set(fs.readFileSync('changed-files.txt', 'utf8').trim().split('\n').filter(Boolean));
              let count = 0;
              const dsRoot = process.cwd() + '/packages/design-system/';
              const filtered = [];
              for (const f of data) {
                const rel = f.filePath.startsWith(dsRoot) ? f.filePath.slice(dsRoot.length) : f.filePath;
                if (changedSet.has(rel)) {
                  for (const m of f.messages) if (m.severity === 1) count++;
                  filtered.push({ file: rel, warnings: f.messages.filter(m => m.severity === 1).length });
                }
              }
              fs.writeFileSync('eslint-changed.json', JSON.stringify(filtered, null, 2));
              console.log(count);
            ")
            echo "changed_warnings=$count" >> "$GITHUB_OUTPUT"
          fi

      - name: Write step summary
        run: |
          set -euo pipefail
          total="${{ steps.summarize.outputs.total_warnings }}"
          test_env="${{ steps.summarize.outputs.test_env_warnings }}"
          errors="${{ steps.summarize.outputs.ignored_errors }}"
          changed="${{ steps.changed.outputs.changed_warnings || '0' }}"
          {
            echo "## DS Lint Warnings — advisory"
            echo ""
            echo "Scope: \`@mfe/design-system/src\`"
            echo ""
            echo "| Metric | Count |"
            echo "|---|---:|"
            echo "| Total warnings | $total |"
            echo "| Test-environment boundary warnings | $test_env |"
            echo "| Changed-file warnings | $changed |"
            echo "| Ignored errors (separate debt) | $errors |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: PR comment (sticky, marker-based)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('eslint-summary.json', 'utf8'));
            let changedFiles = [];
            try {
              changedFiles = JSON.parse(fs.readFileSync('eslint-changed.json', 'utf8'));
            } catch {}
            const marker = '<!-- lint-warn-visibility-advisory -->';
            const total = summary.total;
            const testEnv = summary.testEnv;
            const errors = summary.errors;
            const changedCount = changedFiles.reduce((acc, f) => acc + f.warnings, 0);

            const topRulesRows = summary.topRules
              .map(([rule, count]) => `| \`${rule}\` | ${count} |`)
              .join('\n');
            const topRulesTable = topRulesRows
              ? `| Rule | Count |\n|---|---:|\n${topRulesRows}`
              : '_no warnings_';

            const changedRows = changedFiles
              .filter((f) => f.warnings > 0)
              .slice(0, 10)
              .map((f) => `| \`${f.file}\` | ${f.warnings} |`)
              .join('\n');
            const changedTable = changedRows
              ? `| File | Warnings |\n|---|---:|\n${changedRows}`
              : '_no DS source files changed in this PR, or no warnings on changed files_';

            const body = [
              marker,
              '## DS Lint Warnings — advisory',
              '',
              'Scope: `@mfe/design-system/src`',
              '',
              `Total warnings: **${total}**`,
              `Test-environment boundary warnings: **${testEnv}**`,
              `Changed-file warnings: **${changedCount}**`,
              `Ignored errors: **${errors}** — not evaluated by this advisory job (separate debt).`,
              '',
              '### Top Rules',
              topRulesTable,
              '',
              '### Changed Files',
              changedTable,
              '',
              `Full filtered warning report: artifact \`lint-warn-report\`.`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Upload filtered warning report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-warn-report
          path: |
            eslint-report.json
            eslint-summary.json
            eslint-changed.json

  visual-invariant-required:
    name: Visual Invariant Matrix (Chromium, hard gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Skip on workflow_dispatch baseline mode — visual-invariant-baseline
    # job below handles that path. Push/PR/normal-dispatch run the gate.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'invariant-baseline'
    steps:
      - uses: actions/checkout@v7
        with:
          # Codex iter-3 MEDIUM 3: full history needed for the boundary
          # guard's `git diff origin/<base>...HEAD` call. Default
          # checkout depth=1 makes the guard fall back to warn-only
          # silently, defeating the L4 enforcement.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - name: Forward-looking visual boundary guard
        # Run BEFORE pnpm install / Playwright install: this is a git-
        # only check and we don't want install crashes to mask a guard
        # violation. Codex iter-3 MEDIUM 3.
        run: |
          # Ensure we have the base ref locally (PR shallow clones may
          # not fetch it by default even with fetch-depth: 0 on a fork).
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 || true
          node scripts/ci/check-visual-invariant-boundary.mjs --base=origin/${{ github.base_ref || 'main' }}
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build invariant Storybook
        run: pnpm exec storybook build -c .storybook-invariants -o storybook-static-invariants
      - name: Run invariant matrix snapshots
        env:
          PW_STORYBOOK_INVARIANTS_STATIC_DIR: ${{ github.workspace }}/storybook-static-invariants
        run: |
          cd packages/design-system
          npx playwright test --config playwright.invariants.config.ts
      - name: Upload diff on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-invariant-diff
          path: |
            packages/design-system/src/__visual__/test-results-invariants
            packages/design-system/playwright-report

  visual-invariant-baseline:
    name: Visual Invariant Baseline (manual, --update-snapshots)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Manual baseline regeneration only. Maintainer downloads the
    # uploaded artifact and commits the contents into
    # packages/design-system/src/__visual__/__snapshots__/invariants/.
    # No auto-commit (matches x-charts pattern in
    # x-charts-visual-gate.yml).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'invariant-baseline'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build invariant Storybook
        run: pnpm exec storybook build -c .storybook-invariants -o storybook-static-invariants
      - name: Generate Linux invariant baseline (--update-snapshots)
        env:
          PW_STORYBOOK_INVARIANTS_STATIC_DIR: ${{ github.workspace }}/storybook-static-invariants
        run: |
          cd packages/design-system
          npx playwright test --config playwright.invariants.config.ts --update-snapshots
      - name: Upload baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: visual-invariant-linux-baseline
          path: packages/design-system/src/__visual__/__snapshots__/invariants
          retention-days: 14

  auth-contract-e2e-advisory:
    name: Auth Transport Contract E2E (Chromium, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Phase 2 PR-E2E-6: end-to-end gate for the MFE auth transport
    # contract (ADR-0014) — builds the isolated production-preview
    # mfe-shell with all remotes disabled, serves it, and runs the
    # mocked-backend Playwright suite.
    #
    # History: demoted to advisory in PR #310 and made
    # `workflow_dispatch`-only in PR #561 while the harness was
    # permanently red. Root cause (fixed in PR #563): a disabled
    # remote's STUB manifest entry was not a valid Module Federation
    # container, so the eager `mf-entry-bootstrap` `loadRemote` chain
    # rejected with `#RUNTIME-002`, the real app chunk was never
    # imported, and the preview shell never booted — every spec timed
    # out in `waitForTransportReady`.
    #
    # 2026-05-17: with that fixed the job is green on `pull_request`
    # + `push` (verified on runs 25975069482 + 25975334671), so it
    # runs as a real PR signal again. It stays advisory
    # (`continue-on-error: true`) for a short probation; promotion
    # path (ADR-0014): once it has stayed green for a few PRs, drop
    # `continue-on-error` and add `auth-contract-e2e-required` to the
    # `web-test-gate-required` `needs:` list.
    continue-on-error: true
    # Run on pull_request + push; skip only the workflow_dispatch
    # invariant-baseline mode (mirrors `web-test-gate-required` below).
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'invariant-baseline'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@v6
      - uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build mfe-shell production bundle (Keycloak mode + probe)
        # Production build properly dead-code-eliminates remote MFE
        # static imports via __SHELL_ENDPOINT_ADMIN_REMOTE_ENABLED__
        # define, avoiding vite dev pre-bundling scan failures.
        env:
          VITE_AUTH_CONTRACT_E2E: '1'
          VITE_AUTH_MODE: keycloak
          AUTH_MODE: keycloak
          VITE_SHELL_SKIP_REMOTE_SERVICES: '1'
          SHELL_SKIP_REMOTE_SERVICES: '1'
          VITE_SHELL_ENABLE_SUGGESTIONS_REMOTE: '0'
          SHELL_ENABLE_SUGGESTIONS_REMOTE: '0'
          VITE_SHELL_ENABLE_ETHIC_REMOTE: '0'
          SHELL_ENABLE_ETHIC_REMOTE: '0'
          VITE_SHELL_ENABLE_ENDPOINT_ADMIN_REMOTE: '0'
          SHELL_ENABLE_ENDPOINT_ADMIN_REMOTE: '0'
          VITE_SHELL_ENABLE_REPORTING_REMOTE: '0'
          SHELL_ENABLE_REPORTING_REMOTE: '0'
          VITE_SHELL_ENABLE_USERS_REMOTE: '0'
          SHELL_ENABLE_USERS_REMOTE: '0'
          VITE_SHELL_ENABLE_ACCESS_REMOTE: '0'
          SHELL_ENABLE_ACCESS_REMOTE: '0'
          VITE_SHELL_ENABLE_AUDIT_REMOTE: '0'
          SHELL_ENABLE_AUDIT_REMOTE: '0'
          # schema-explorer is the 8th MF remote. Without disabling it the
          # production build keeps its dev remoteEntry (localhost:3008),
          # which is unreachable on the CI runner → `net::ERR_CONNECTION_
          # REFUSED` → `[ Federation Runtime ]` crash → blank shell → the
          # auth FSM never reaches `transportReady` and the whole serial
          # block times out. The other 7 remotes were already disabled
          # here; schema-explorer was simply missed.
          VITE_SHELL_ENABLE_SCHEMA_EXPLORER_REMOTE: '0'
          SHELL_ENABLE_SCHEMA_EXPLORER_REMOTE: '0'
        run: pnpm --filter mfe-shell build
      - name: Serve built bundle (preview)
        env:
          VITE_AUTH_CONTRACT_E2E: '1'
        run: |
          pnpm --filter mfe-shell exec vite preview --host 0.0.0.0 --port 3000 &
          echo $! > /tmp/vite-pid
          # Wait for preview server to be reachable (max 60s)
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/ > /dev/null; then
              echo "Preview server reachable after ${i}x3s"
              break
            fi
            sleep 3
          done
          curl -sI http://localhost:3000/ | head -5
      - name: Run auth transport contract E2E (Chromium)
        env:
          VITE_AUTH_CONTRACT_E2E: '1'
        run: |
          pnpm exec playwright test \
            --config=tests/playwright/playwright.config.ts \
            --project=chromium \
            tests/playwright/auth-transport-contract.spec.ts
      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/vite-pid ]; then
            kill "$(cat /tmp/vite-pid)" 2>/dev/null || true
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: auth-contract-e2e-report
          path: |
            playwright-report
            test-results

  web-test-gate-required:
    name: Web Test Gate (aggregator)
    runs-on: ubuntu-latest
    needs:
      - unit-required
      - token-drift-required
      - semantic-layer-required
      - cssom-canary-required
      - cssom-full-advisory
      - lint-warn-visibility-advisory
      - visual-invariant-required
    # Always run so the aggregator can read advisory results when STRICT_GATES=true.
    # Skip on baseline-only manual runs (visual-invariant-required is skipped).
    if: always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'invariant-baseline')
    steps:
      - name: Verify required jobs succeeded
        run: |
          set -euo pipefail
          unit_result="${{ needs.unit-required.result }}"
          token_result="${{ needs.token-drift-required.result }}"
          semantic_result="${{ needs.semantic-layer-required.result }}"
          cssom_result="${{ needs.cssom-canary-required.result }}"
          visual_result="${{ needs.visual-invariant-required.result }}"
          echo "unit-required: $unit_result"
          echo "token-drift-required: $token_result"
          echo "semantic-layer-required: $semantic_result"
          echo "cssom-canary-required: $cssom_result"
          echo "visual-invariant-required: $visual_result"
          if [[ "$unit_result" != "success" || "$token_result" != "success" || "$semantic_result" != "success" || "$cssom_result" != "success" || "$visual_result" != "success" ]]; then
            echo "::error::A required job failed."
            exit 1
          fi
      - name: Strict gates (promote advisory to required)
        if: vars.STRICT_GATES == 'true'
        run: |
          set -euo pipefail
          echo "STRICT_GATES=true — advisory jobs treated as required."
          # Advisory jobs use step-level continue-on-error and expose the
          # true outcome via job outputs; we read those outputs here so a
          # genuine advisory failure can fail the aggregator without
          # blocking merge under default (non-strict) operation.
          #
          # We check three conditions independently because the edge cases
          # don't combine cleanly into one expression:
          #   - job result = failure/cancelled but outcome = skipped happens
          #     when the run step never executes (e.g. dependency install
          #     fails). The boolean AND in the previous version let this
          #     slip through under STRICT_GATES.
          #   - outcome = failure is the obvious bad case.
          #   - any unfamiliar outcome value (e.g. cancelled in a future
          #     Actions runtime) should also fail loudly under strict mode.
          # PR-1 only wires cssom-full-advisory; future advisories
          # (visual-full, browser-full) will be added the same way.
          full_outcome="${{ needs.cssom-full-advisory.outputs.cssom_full_outcome || 'skipped' }}"
          full_result="${{ needs.cssom-full-advisory.result || 'skipped' }}"
          echo "cssom-full-advisory job result: $full_result"
          echo "cssom-full-advisory step outcome: $full_outcome"

          if [[ "$full_result" != "success" && "$full_result" != "skipped" ]]; then
            echo "::error::Advisory job result '$full_result' is not acceptable under STRICT_GATES=true (install/setup failure?)."
            exit 1
          fi

          if [[ "$full_outcome" == "failure" ]]; then
            echo "::error::Advisory job cssom-full-advisory failed under STRICT_GATES=true."
            exit 1
          fi

          if [[ "$full_outcome" != "success" && "$full_outcome" != "skipped" ]]; then
            echo "::error::Advisory step outcome '$full_outcome' is not acceptable under STRICT_GATES=true."
            exit 1
          fi

          # PR-2B-3 (Codex thread 019df8cc): lint-warn-visibility-advisory
          # is checked for INFRA failures only (install, parse, comment
          # script). Warning count is intentionally NOT a STRICT_GATES
          # blocker — current baseline ~800 warnings would lock every PR
          # the moment STRICT_GATES flips on. A future LINT_WARNING_BASELINE
          # / delta gate is the right tool for that, scoped to a separate
          # PR after the baseline shrinks.
          lint_outcome="${{ needs.lint-warn-visibility-advisory.outputs.lint_advisory_outcome || 'skipped' }}"
          lint_result="${{ needs.lint-warn-visibility-advisory.result || 'skipped' }}"
          echo "lint-warn-visibility-advisory job result: $lint_result"
          echo "lint-warn-visibility-advisory step outcome: $lint_outcome"

          if [[ "$lint_result" != "success" && "$lint_result" != "skipped" ]]; then
            echo "::error::Lint advisory job result '$lint_result' is not acceptable under STRICT_GATES=true (install/setup failure?)."
            exit 1
          fi
          # Note: lint_outcome of `failure` here means ESLint itself crashed
          # (parse error, config issue) — NOT that warnings appeared. The
          # `--max-warnings 100000` cap converts warning counts into exit 0.
          if [[ "$lint_outcome" == "failure" ]]; then
            echo "::error::ESLint infra failure in advisory job (parse/config — not warning count)."
            exit 1
          fi
