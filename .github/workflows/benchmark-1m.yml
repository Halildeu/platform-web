name: Design Lab Benchmark — 1M Artifact (PR-A1.6b + PR-A1.6c gate)

# Produces the 1M scatter benchmark artifact and runs the hard KPI
# gate enforcer (PR-A1.6c) on a self-hosted GPU runner. Two trigger
# modes:
#
#   workflow_dispatch — manual run on any branch / SHA. Used to
#     bootstrap the `main` baseline artifact and to debug locally.
#     Falls back to absolute-only thresholds when the baseline is
#     missing.
#
#   pull_request labeled `bench-1m-gate` — turns the gate red on the
#     PR check when the artifact regresses past the configured
#     thresholds (`benchmark-thresholds.json :: design-lab-scatter-
#     benchmark.v2`). Triggered only on same-repo PRs (fork PRs
#     never touch the GPU runner).
#
# The runner identity is `[self-hosted, linux, x64, gpu, platform-
# web-benchmark-1m]` — the runbook at
# `docs/operations/benchmark-self-hosted-runner.md` documents the
# provisioning steps an operator follows to register a runner with
# that label set. Until at least one operator-provisioned runner is
# online the workflow stays queued; this is intentional — Codex
# thread `019e0f63` iter-1 made the explicit call that GitHub-hosted
# SwiftShader can't carry a hard 1M WebGL gate.
#
# The hard KPI threshold itself lives in `benchmark-thresholds.json`
# under the `design-lab-scatter-benchmark.v2` namespace; threshold
# edits land via PR review like any other config.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / SHA to benchmark (defaults to the workflow ref).'
        required: false
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: read
  # Sticky comment + (optional) status update needs both. Keep them
  # narrow — no `write` on `contents` so the runner can't push a
  # commit.
  pull-requests: write
  issues: write

concurrency:
  group: benchmark-1m-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-1m:
    name: 1M scatter benchmark + hard KPI gate
    # SECURITY: never run a fork PR on the self-hosted GPU runner.
    # The label gate is maintainer-controlled, but a fork PR can
    # synchronise after a maintainer adds the label and re-trigger
    # the workflow with attacker-controlled code in `head.repo`.
    # The `head.repo.full_name == github.repository` check pins the
    # job to same-repo branches only.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'bench-1m-gate')
      )
    runs-on: [self-hosted, linux, x64, gpu, platform-web-benchmark-1m]
    timeout-minutes: 35

    env:
      # `pull_request` events surface as `pr` to the enforcer (fail-
      # closed on missing baseline); everything else is treated as
      # `workflow_dispatch` (absolute-only fallback).
      ENFORCER_MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Codex iter-3 P2: pin to the repo's `.nvmrc` so the
          # benchmark runtime matches every other CI workflow
          # (`engines.node >=22.12`). Hard-coding `20` would use a
          # different V8 / GC tuning than production builds.
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # PR-A2b correctness pre-flight (Codex thread `019e0faa` iter-1).
      # Runs the synthetic spike fixture + anomaly-preserving LTTB
      # downsampler against the `correctness` block of
      # `benchmark-thresholds.json` BEFORE the heavy Chromium /
      # Vite / Playwright artifact run. A recall regression here
      # turns the PR check red without paying for the full benchmark
      # round, and proves the algorithm contract independently of
      # GPU jitter.
      - name: Run benchmark correctness pre-flight
        # `pnpm -w` targets the workspace-root scripts namespace
        # (where `bench:correctness` lives). Without `-w` pnpm
        # tries to find the script inside one of the workspace
        # packages and errors out.
        run: pnpm -w run bench:correctness

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture Chromium version
        id: chromium
        run: |
          version=$(pnpm exec playwright --version | tr -d '\n')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Start Vite dev server (flag-on, fake-auth)
        env:
          VITE_ENABLE_DESIGN_LAB_BENCHMARK: 'true'
          VITE_AUTH_MODE: permitAll
          VITE_ENABLE_FAKE_AUTH: 'true'
          WEB_RUNTIME_REQUIRE_BACKEND_GUARD: '0'
        run: |
          pnpm --filter mfe-shell exec vite \
            --host 127.0.0.1 \
            --port 3000 \
            --logLevel warn \
            > vite-dev.log 2>&1 &
          echo "VITE_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for dev server readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:3000 > /dev/null; then
              echo "Vite dev server ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::vite dev server failed to come up"
          tail -200 vite-dev.log || true
          exit 1

      - name: Run benchmark-1m Playwright spec
        env:
          RUN_DESIGN_LAB_BENCHMARK: '1'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PW_FAKE_AUTH: '1'
          PLAYWRIGHT_VERSION: ${{ steps.chromium.outputs.version }}
          CHROMIUM_VERSION: ${{ steps.chromium.outputs.version }}
          BENCHMARK_RUNNER_PROFILE: self-hosted-gpu
        run: |
          # Codex iter-3 P1: the `chromium` project lives in the
          # tests/playwright config, not the root one (root projects
          # are desktop-light/dark/mobile/tablet). Without --config
          # the project filter resolves to nothing and the spec
          # never runs.
          npx playwright test \
            tests/playwright/design-lab.benchmark-1m-artifact.spec.ts \
            --config tests/playwright/playwright.config.ts \
            --project=chromium \
            --workers=1 \
            --reporter=list

      - name: Stop Vite dev server
        if: always()
        run: |
          if [ -n "${VITE_PID:-}" ]; then
            kill "$VITE_PID" || true
          fi

      - name: Locate artifact JSON
        id: artifact
        if: always()
        run: |
          path=$(find test-results -name 'benchmark-1m-artifact.json' -type f | head -1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          if [ -z "$path" ]; then
            echo "::warning::benchmark-1m-artifact.json not produced"
          fi

      - name: Download main baseline artifact (best effort)
        id: baseline
        if: steps.artifact.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p baseline
          # Fetch the most recent benchmark-1m artifact uploaded by
          # the same workflow run on `main`. Codex iter-2: do NOT
          # use actions/cache as the baseline source — the cache key
          # would be branch-bound and is mutable.
          set +e
          run_id=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/benchmark-1m.yml/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          set -e
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "no main baseline run found — enforcer will see --no-baseline"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Codex iter-3 P1: `gh run download --name` is exact-match;
          # the glob form needs `--pattern`. Without this the
          # download silently produces no artifact and PR mode
          # always fail-closes on missing baseline.
          gh run download "$run_id" \
            --repo "${{ github.repository }}" \
            --dir baseline \
            --pattern "benchmark-1m-${run_id}-*" || true
          baseline_path=$(find baseline -name 'benchmark-1m-artifact.json' -type f | head -1)
          if [ -n "$baseline_path" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$baseline_path" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run benchmark-1m enforcer
        id: enforce
        if: steps.artifact.outputs.path != ''
        run: |
          flags=""
          if [ "${{ steps.baseline.outputs.found }}" = "true" ]; then
            flags="--baseline ${{ steps.baseline.outputs.path }}"
          else
            flags="--no-baseline"
          fi
          mkdir -p enforcer-out
          set +e
          node scripts/ci/benchmark-1m-enforcer.mjs \
            --artifact "${{ steps.artifact.outputs.path }}" \
            --thresholds benchmark-thresholds.json \
            --mode "$ENFORCER_MODE" \
            $flags \
            --summary-out enforcer-out/summary.md \
            --json-out enforcer-out/verdict.json
          enforcer_exit=$?
          set -e
          echo "exit=$enforcer_exit" >> "$GITHUB_OUTPUT"
          # Append the markdown summary to the GHA job summary panel
          # so the operator can see the verdict without downloading
          # any artifact.
          cat enforcer-out/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update sticky PR comment
        if: github.event_name == 'pull_request' && steps.artifact.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # Comment update is non-fatal: even if GitHub API blips the
        # benchmark verdict from the enforcer step has already
        # decided pass/fail.
        continue-on-error: true
        run: |
          # Find the existing sticky comment by marker.
          marker='<!-- benchmark-1m:start -->'
          existing=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
            | head -1)
          body_path=enforcer-out/summary.md
          if [ -n "$existing" ]; then
            gh api \
              -X PATCH \
              "repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat $body_path)"
          else
            gh api \
              -X POST \
              "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -f body="$(cat $body_path)"
          fi

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-1m-${{ github.run_id }}-${{ github.sha }}
          path: |
            test-results/**/benchmark-1m-artifact.json
            enforcer-out/**
            vite-dev.log
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job on enforcer verdict
        if: steps.artifact.outputs.path != '' && steps.enforce.outputs.exit != '0'
        run: |
          echo "::error::benchmark-1m enforcer failed (exit ${{ steps.enforce.outputs.exit }})"
          exit 1
