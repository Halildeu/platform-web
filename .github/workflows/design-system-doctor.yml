name: Design System Doctor

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/design-system/src/**'
      - 'packages/design-system/scripts/ci/**'

jobs:
  doctor:
    name: Design System Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run design-system-doctor
        id: doctor
        run: |
          cd packages/design-system
          node scripts/ci/design-system-doctor.mjs --ci 2>&1 | tee /tmp/doctor-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/doctor-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Comment PR with doctor report
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.doctor.outputs.report }}`;
            const lines = output.split('\n').filter(l => l.trim());

            const icon = (l) => {
              if (l.includes('✓') || l.includes('PASS')) return '✅';
              if (l.includes('⚠')) return '⚠️';
              if (l.includes('✗') || l.includes('FAIL')) return '❌';
              return '';
            };

            const summaryLine = lines.find(l => l.includes('Summary:')) || '';
            const checkLines = lines.filter(l =>
              l.trim().startsWith('✓') || l.trim().startsWith('✗') || l.trim().startsWith('⚠')
            );

            let table = '| Status | Check |\n|--------|-------|\n';
            for (const line of checkLines) {
              const clean = line.replace(/\x1b\[[0-9;]*m/g, '').trim();
              const status = clean.startsWith('✓') ? '✅' : clean.startsWith('⚠') ? '⚠️' : '❌';
              const text = clean.replace(/^[✓✗⚠]\s*/, '');
              table += `| ${status} | ${text} |\n`;
            }

            const cleanSummary = summaryLine.replace(/\x1b\[[0-9;]*m/g, '').trim();
            const failed = '${{ steps.doctor.outputs.exit_code }}' !== '0';

            const body = `## 🩺 Design System Doctor

            ${table}

            **${cleanSummary}**

            ${failed ? '❌ Doctor found critical issues — merge blocked' : '✅ All critical checks passed'}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.split('\n').map(l => l.trim()).join('\n'),
            });
