name: CI - Etik Speak Manager Image

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/etik-speak-manager/**'
      - 'apps/mfe-ethic/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-etik-speak-manager-image.yml'
      - '.github/workflows/release-etik-speak-manager-image.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Manager security contract and production build
        run: |
          pnpm --filter etik-speak-manager test
          pnpm exec tsc -p apps/etik-speak-manager/tsconfig.json
          pnpm --filter etik-speak-manager build
      - name: Build unprivileged local candidate
        run: |
          docker build \
            --build-arg BUILD_SHA="${GITHUB_SHA}" \
            --tag etik-speak-manager:candidate \
            --file apps/etik-speak-manager/Dockerfile .
      - name: Local candidate route and security smoke
        run: |
          container="etik-speak-manager-validate-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name "$container" -p 127.0.0.1:18080:8080 etik-speak-manager:candidate
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/healthz >/dev/null; then break; fi
            if [ "$attempt" -eq 30 ]; then docker logs "$container"; exit 1; fi
            sleep 1
          done
          curl --fail --silent --show-error --dump-header /tmp/root.headers \
            --output /tmp/manager.html http://127.0.0.1:18080/ethic/
          curl --fail --silent --show-error --dump-header /tmp/deep.headers \
            --output /tmp/deep.html http://127.0.0.1:18080/ethic/cases/synthetic
          curl --silent --show-error --dump-header /tmp/redirect.headers \
            --output /dev/null http://127.0.0.1:18080/ethic
          grep -q 'Etik Speak' /tmp/manager.html
          cmp /tmp/manager.html /tmp/deep.html
          grep -Eiq '^HTTP/[^ ]+ 308' /tmp/redirect.headers
          grep -Eiq '^Location: /ethic/' /tmp/redirect.headers
          grep -Fq "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self'" /tmp/root.headers
          grep -Eiq '^Cache-Control: no-store' /tmp/root.headers
          asset="$(grep -oE '/ethic/assets/[^" ]+\.js' /tmp/manager.html | head -1)"
          test -n "$asset"
          curl --fail --silent --show-error --dump-header /tmp/asset.headers \
            --output /dev/null "http://127.0.0.1:18080${asset}"
          grep -Eiq '^Cache-Control: public,max-age=31536000,immutable' /tmp/asset.headers
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:18080/ethic/assets/missing.js)" = 404
      - name: Install isolated Chromium for runtime boot smoke
        run: pnpm exec playwright install --with-deps chromium
      - name: Execute the production bundle and auth gate in Chromium
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ headless: true });
          try {
            for (const path of ['/ethic/', '/ethic/cases/synthetic']) {
              const page = await browser.newPage();
              const runtimeErrors = [];
              const authRequests = [];
              let renderedHeading = false;
              await page.exposeFunction('recordEtikSpeakHeading', () => {
                renderedHeading = true;
              });
              await page.addInitScript(() => {
                const observer = new MutationObserver(() => {
                  if (document.querySelector('h1')?.textContent?.trim() === 'Etik Speak') {
                    window.recordEtikSpeakHeading();
                    observer.disconnect();
                  }
                });
                observer.observe(document, { childList: true, subtree: true });
              });
              page.on('pageerror', (error) => runtimeErrors.push(`pageerror: ${error.message}`));
              page.on('request', (request) => {
                if (request.url().includes('/realms/platform-test/protocol/openid-connect/auth')) {
                  authRequests.push(request.url());
                }
              });
              page.on('console', (message) => {
                if (message.type() === 'error' && /content security policy|refused to/i.test(message.text())) {
                  runtimeErrors.push(`console: ${message.text()}`);
                }
              });
              await page.goto(`http://127.0.0.1:18080${path}`, { waitUntil: 'networkidle' });
              if (!renderedHeading) throw new Error(`${path}: React auth gate did not render`);
              if (authRequests.length !== 1) throw new Error(`${path}: expected one Keycloak check-sso request`);
              const authorize = new URL(authRequests[0]);
              if (authorize.searchParams.get('client_id') !== 'frontend') throw new Error(`${path}: wrong client`);
              if (authorize.searchParams.get('code_challenge_method') !== 'S256') throw new Error(`${path}: PKCE missing`);
              if (authorize.searchParams.get('prompt') !== 'none') throw new Error(`${path}: check-sso not bounded`);
              if (runtimeErrors.length) throw new Error(`${path}: ${runtimeErrors.join('; ')}`);
              await page.close();
            }
          } finally {
            await browser.close();
          }
          NODE
