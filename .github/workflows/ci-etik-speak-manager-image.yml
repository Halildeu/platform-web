name: CI - Etik Speak Manager Image

on:
  push:
    branches: [main]
    paths:
      - 'apps/etik-speak-manager/**'
      - 'apps/mfe-ethic/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-etik-speak-manager-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/etik-speak-manager/**'
      - 'apps/mfe-ethic/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-etik-speak-manager-image.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.12'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Manager security contract and production build
        run: |
          pnpm --filter etik-speak-manager test
          pnpm exec tsc -p apps/etik-speak-manager/tsconfig.json
          pnpm --filter etik-speak-manager build
      - name: Build unprivileged local candidate
        run: |
          docker build \
            --build-arg BUILD_SHA="${GITHUB_SHA}" \
            --tag etik-speak-manager:candidate \
            --file apps/etik-speak-manager/Dockerfile .
      - name: Local candidate route and security smoke
        run: |
          container="etik-speak-manager-validate-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name "$container" -p 127.0.0.1:18080:8080 etik-speak-manager:candidate
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/healthz >/dev/null; then break; fi
            if [ "$attempt" -eq 30 ]; then docker logs "$container"; exit 1; fi
            sleep 1
          done
          curl --fail --silent --show-error --dump-header /tmp/root.headers \
            --output /tmp/manager.html http://127.0.0.1:18080/ethic/
          curl --fail --silent --show-error --dump-header /tmp/deep.headers \
            --output /tmp/deep.html http://127.0.0.1:18080/ethic/cases/synthetic
          curl --silent --show-error --dump-header /tmp/redirect.headers \
            --output /dev/null http://127.0.0.1:18080/ethic
          grep -q 'Etik Speak' /tmp/manager.html
          cmp /tmp/manager.html /tmp/deep.html
          grep -Eiq '^HTTP/[^ ]+ 308' /tmp/redirect.headers
          grep -Eiq '^Location: /ethic/' /tmp/redirect.headers
          grep -Fq "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self'" /tmp/root.headers
          grep -Eiq '^Cache-Control: no-store' /tmp/root.headers
          asset="$(grep -oE '/ethic/assets/[^" ]+\.js' /tmp/manager.html | head -1)"
          test -n "$asset"
          curl --fail --silent --show-error --dump-header /tmp/asset.headers \
            --output /dev/null "http://127.0.0.1:18080${asset}"
          grep -Eiq '^Cache-Control: public,max-age=31536000,immutable' /tmp/asset.headers
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:18080/ethic/assets/missing.js)" = 404

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Build exact trusted-main candidate
        run: |
          docker build \
            --build-arg BUILD_SHA="${GITHUB_SHA}" \
            --tag etik-speak-manager:candidate \
            --file apps/etik-speak-manager/Dockerfile .
      - name: Smoke before registry credentials or publication
        run: |
          container="etik-speak-manager-release-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name "$container" -p 127.0.0.1:18080:8080 etik-speak-manager:candidate
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/healthz >/dev/null; then break; fi
            if [ "$attempt" -eq 30 ]; then docker logs "$container"; exit 1; fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:18080/ethic/ | grep -q 'Etik Speak'
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish the already-smoked image bytes
        id: publish
        run: |
          repository='ghcr.io/halildeu/platform-web-etik-speak-manager'
          immutable_tag="sha-${GITHUB_SHA}"
          if docker manifest inspect "${repository}:${immutable_tag}" >/dev/null 2>&1; then
            echo "FATAL: immutable source tag already exists: ${immutable_tag}" >&2
            exit 1
          fi
          docker tag etik-speak-manager:candidate "${repository}:${immutable_tag}"
          docker push "${repository}:${immutable_tag}" | tee /tmp/push.log
          digest="$(sed -nE 's/.*digest: (sha256:[0-9a-f]{64}).*/\1/p' /tmp/push.log | tail -1)"
          test -n "$digest"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign GitHub artifact provenance after smoke and publication
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/halildeu/platform-web-etik-speak-manager
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
      - name: Immutable image evidence
        run: |
          echo "Digest: \`${{ steps.publish.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
