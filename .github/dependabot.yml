version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    # K7 (2026-04-28): grouped sadece patch — minor bump'lar ayrı PR (24-update
    # mega PR'lar tekrar oluşmasın). Major bump'lar her zaman ayrı PR.
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'patch'
    # K7: AG Grid + AG Charts major bump'ları ignore. Repo kuralı
    # `.claude/rules/ag-grid.md` v34.3.1 PINNED — explicit approval şart.
    ignore:
      - dependency-name: 'ag-grid-community'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ag-grid-enterprise'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ag-grid-react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ag-charts-community'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ag-charts-enterprise'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ag-charts-react'
        update-types: ['version-update:semver-major']
      # 2026-06-23: @module-federation/vite PINNED to 1.15.5. 1.16.x (1.16.8,
      # landed via #819) regressed the host-only (import:false) shared-module
      # class proxy → `new QueryClient()` in federated hostOnly paths threw
      # "Class constructor cannot be invoked without 'new'", crashing mfe-users
      # on testai (confirmed). Risk applies to any remote that instantiates an
      # exported class from a host-only shared module (access/audit/reporting
      # are risk-surface, not separately confirmed). Ignore minor+major until
      # upstream fixes; re-evaluate manually with users + another hostOnly
      # remote smoke before unpinning.
      - dependency-name: '@module-federation/vite'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-major'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
