name: Audit QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build audit micro-frontend
        run: npm run quality:audit:build

      - name: Run Lighthouse performance assertions
        run: npm run test:perf

      - name: Run axe accessibility audit
        run: npm run test:a11y
