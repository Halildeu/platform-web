<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit MFE</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var port = Number(window.location.port || '0');
        if (typeof window.__AUDIT_USE_MOCK__ === 'undefined' && port >= 55000) {
          window.__AUDIT_USE_MOCK__ = true;
        }
      }());
    </script>
  </body>
</html>
