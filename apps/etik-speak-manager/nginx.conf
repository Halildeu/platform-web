server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  absolute_redirect off;
  location = /healthz {
    access_log off;
    include /etc/nginx/security-headers.conf.inc;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
  location = /ethic {
    include /etc/nginx/security-headers.conf.inc;
    return 308 /ethic/;
  }
  location = /ethic/index.html {
    include /etc/nginx/security-headers.conf.inc;
    add_header Cache-Control "no-store" always;
  }
  location ^~ /ethic/assets/ {
    include /etc/nginx/security-headers.conf.inc;
    try_files $uri =404;
    add_header Cache-Control "public,max-age=31536000,immutable";
  }
  location /ethic/ {
    include /etc/nginx/security-headers.conf.inc;
    try_files $uri $uri/ /ethic/index.html;
    add_header Cache-Control "no-store" always;
  }
}
