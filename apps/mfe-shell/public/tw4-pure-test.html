<!DOCTYPE html>
<html>
<head>
<style>
@layer properties;
@layer theme, base, components, utilities;
@layer theme { :root { --spacing: 0.25rem; } }
@layer base { *, ::after, ::before { margin: 0; padding: 0; border: 0 solid; } }
@layer utilities {
  .py-2 { padding-block: calc(var(--spacing) * 2); }
  .px-3 { padding-inline: calc(var(--spacing) * 3); }
  .p-2 { padding: calc(var(--spacing) * 2); }
  .bg-red { background: red; }
  .text-white { color: white; }
}
</style>
</head>
<body>
<div class="py-2 px-3 bg-red text-white" id="test1">PY-2 PX-3 TEST</div>
<div class="p-2 bg-red text-white" id="test2">P-2 TEST</div>
<script>
const s1 = getComputedStyle(document.getElementById('test1'));
const s2 = getComputedStyle(document.getElementById('test2'));
document.body.innerHTML += '<pre>' + JSON.stringify({
  'py-2 paddingTop': s1.paddingTop,
  'py-2 paddingLeft': s1.paddingLeft,
  'p-2 paddingTop': s2.paddingTop,
}, null, 2) + '</pre>';
</script>
</body>
</html>
