<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/tailwind.css">
    </head>
<body>
  <script>
    // Runtime environment — injected at build time via HtmlWebpackPlugin
    // or overridden manually for specific deployment targets.
    // webpack DefinePlugin replaces process.env at compile time,
    // but design-system (separate chunk) reads from window.__env__.
    window.__env__ = window.__env__ || {};
    // Debug: capture first uncaught errors before React loads
    window.__earlyErrors = [];
    window.addEventListener('error', function(e) {
      window.__earlyErrors.push({ msg: e.message, file: e.filename, line: e.lineno, col: e.colno });
    });
  </script>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
