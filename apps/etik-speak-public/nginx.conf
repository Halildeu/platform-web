server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }
  location = /index.html { add_header Cache-Control "no-store" always; }
  location /assets/ { try_files $uri =404; add_header Cache-Control "public,max-age=31536000,immutable"; }
  location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-store" always; }
}
